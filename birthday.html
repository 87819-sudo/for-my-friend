<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>生日快乐，王杨瑾！</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a0533, #0d1b6e, #1a0533);
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    .card {
      text-align: center;
      padding: 3.5rem 4rem;
      border-radius: 24px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      position: relative; overflow: hidden;
      max-width: 520px; width: 90vw;
    }
    .cake { font-size: 80px; display: block; margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)}
    }
    .title {
      font-size: 2.6rem; font-weight: 700; color: #fff;
      text-shadow: 0 0 20px rgba(255,200,50,0.9);
      letter-spacing: 4px; margin-bottom: .5rem;
      animation: fadeIn 1s ease both;
    }
    .name  {
      font-size: 1.6rem; color: #ffe066;
      margin-bottom: 1.2rem;
      animation: fadeIn 1s .3s ease both;
    }
    .blessing {
      font-size: 1.05rem; color: rgba(255,235,160,0.9);
      line-height: 1.8;
      animation: fadeIn 1s .6s ease both;
    }
    .en { font-size: .9rem; color: rgba(255,255,255,.5);
          margin-top: .5rem; letter-spacing: 1px; }
    @keyframes fadeIn {
      from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}
    }
    .stars { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none; }
    .star  {
      position:absolute;width:5px;height:5px;border-radius:50%;background:#ffe066;
      animation: sparkle 2s infinite;
    }
    @keyframes sparkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(1.5)} }
    .particle {
      position:absolute; width:8px; height:8px; border-radius:50%;
      animation: fly 1.1s ease-out forwards;
    }
    @keyframes fly {
      0%  {transform:translate(var(--ex0),var(--ey0)) scale(0);opacity:1}
      100%{transform:translate(var(--ex1),var(--ey1)) scale(1);opacity:0}
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="stars" id="stars"></div>
    <span class="cake">🎂</span>
    <div class="title">生日快乐</div>
    <div class="name">亲爱的 王杨瑾 🎉</div>
    <div class="blessing">希望你天天开心，永远好心情</div>
    <div class="en">Happy Birthday, dear friend!</div>
  </div>
  <script>
    const stars = document.getElementById('stars');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random()*100+'%';
      s.style.top  = Math.random()*100+'%';
      s.style.animationDelay = Math.random()*2+'s';
      s.style.opacity = Math.random()*.6+.2;
      stars.appendChild(s);
    }

    const colors = ['#ff6b9d','#ffd93d','#6bcbff','#a8ff78','#f7971e','#c471ed','#ff9a9e'];
    function firework() {
      const card = document.getElementById('card');
      for (let b = 0; b < 5; b++) {
        const ox = (Math.random()*70+15)+'%';
        const oy = (Math.random()*55+10)+'%';
        for (let i = 0; i < 16; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const angle = Math.random()*360;
          const dist  = Math.random()*90+40;
          const ex1   = Math.cos(angle*Math.PI/180)*dist+'px';
          const ey1   = Math.sin(angle*Math.PI/180)*dist+'px';
          p.style.cssText = 'left:'+ox+';top:'+oy+
            ';background:'+colors[Math.floor(Math.random()*colors.length)]+
            ';--ex0:0;--ey0:0;--ex1:'+ex1+';--ey1:'+ey1+
            ';animation-delay:'+(b*.18)+'s;';
          card.appendChild(p);
          setTimeout(() => p.remove(), b*180+1300);
        }
      }
    }
    firework();
    setInterval(firework, 3200);
  </script>
</body>
</html>
